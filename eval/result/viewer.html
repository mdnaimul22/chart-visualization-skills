<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AntV Eval Viewer</title>
  <link rel="icon" href="https://mdn.alipayobjects.com/huamei_qa8qxu/afts/img/A*FBLnQIAzx6cAAAAAQDAAAAgAemJ7AQ/original">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@antv/g2@5.4.8/dist/g2.min.js"></script>
  <script src="https://unpkg.com/@antv/g6@5.0.42/dist/g6.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.js"></script>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────────── */
    :root {
      --bg-app:        #f5f5f5;
      --bg-sidebar:    #ffffff;
      --bg-surface:    #fafafa;
      --bg-panel:      #f5f5f5;
      --bg-input:      #ffffff;
      --bg-hover:      #f0f0f0;
      --bg-active:     #ebebeb;

      --border:        #e4e4e7;
      --border-subtle: #eeeeee;
      --border-focus:  #6366f1;

      --text-primary:  #111111;
      --text-secondary:#555555;
      --text-tertiary: #999999;
      --text-inverse:  #ffffff;

      --accent:        #6366f1;
      --accent-hover:  #818cf8;
      --accent-dim:    rgba(99,102,241,0.15);

      --green:         #22c55e;
      --green-dim:     rgba(34,197,94,0.12);
      --red:           #ef4444;
      --red-dim:       rgba(239,68,68,0.12);
      --amber:         #f59e0b;
      --amber-dim:     rgba(245,158,11,0.12);
      --purple:        #a855f7;
      --purple-dim:    rgba(168,85,247,0.12);

      --radius-sm:     6px;
      --radius:        8px;
      --radius-lg:     12px;

      --shadow-sm:     0 1px 3px rgba(0,0,0,0.4);
      --shadow:        0 4px 12px rgba(0,0,0,0.5);

      --sidebar-w:     360px;
      --toolbar-h:     48px;
      --panel-header-h: 38px;
      --transition:    all 0.15s ease;
    }

    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-app);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .app-container {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ───────────────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .sidebar-header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .summary-info {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }

    .summary-info span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .summary-info .success {
      color: var(--green);
    }

    .summary-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-subtle);
    }

    .stat-item {
      text-align: center;
      padding: 8px 4px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
    }

    .stat-item .stat-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
    }

    .stat-item .stat-label {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .stat-item.success .stat-value { color: var(--green); }
    .stat-item.warning .stat-value { color: var(--amber); }
    .stat-item.error .stat-value { color: var(--red); }

    .render-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
    }

    .render-status.success {
      background: var(--green-dim);
      color: var(--green);
    }

    .render-status.error {
      background: var(--red-dim);
      color: var(--red);
    }

    .render-status.blank {
      background: var(--amber-dim);
      color: var(--amber);
    }

    .render-status.pending {
      background: var(--bg-active);
      color: var(--text-tertiary);
    }

    .toolbar .run-all-btn {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    .toolbar .run-all-btn:hover {
      background: #9333ea;
      border-color: #9333ea;
    }

    .toolbar .run-all-btn:disabled {
      background: var(--border);
      border-color: var(--border);
      color: var(--text-tertiary);
      cursor: not-allowed;
    }

    .toolbar .stats-btn {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .toolbar .stats-btn:hover {
      background: #16a34a;
      border-color: #16a34a;
    }

    .toolbar .dataset-select {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      background: var(--bg-input);
      cursor: pointer;
      max-width: 280px;
      min-width: 180px;
      margin-right: 8px;
      color: var(--text-primary);
      font-family: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .toolbar .dataset-select option {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 400px;
    }

    .toolbar .dataset-select:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    .toolbar .nav-buttons {
      display: flex;
      gap: 4px;
      margin-left: auto;
      align-items: center;
    }

    .results-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .results-list::-webkit-scrollbar { width: 4px; }
    .results-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .result-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: var(--transition);
    }

    .result-item:hover {
      background: var(--bg-hover);
    }

    .result-item.active {
      background: var(--accent-dim);
      border-left: 3px solid var(--accent);
    }

    .result-item .topic {
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 4px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .result-item .query {
      font-size: 13px;
      color: var(--text-primary);
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.5;
    }

    .result-item .meta {
      display: flex;
      gap: 8px;
      font-size: 11px;
      color: var(--text-tertiary);
      align-items: center;
      flex-wrap: wrap;
    }

    .result-item .duration {
      color: var(--accent);
    }

    .result-item .similarity {
      font-weight: 500;
    }

    .result-item .similarity.high { color: var(--green); }
    .result-item .similarity.medium { color: var(--amber); }
    .result-item .similarity.low { color: var(--red); }

    .result-item .mark-badge {
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 500;
    }

    .result-item .mark-badge.correct {
      background: var(--green-dim);
      color: var(--green);
    }

    .result-item .mark-badge.incorrect {
      background: var(--red-dim);
      color: var(--red);
    }

    .result-item .issues-badge {
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 500;
      background: var(--amber-dim);
      color: var(--amber);
    }

    .result-item .library-badge {
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .result-item .library-badge.g2 {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .result-item .library-badge.g6 {
      background: var(--green-dim);
      color: var(--green);
    }

    .result-item .tool-calls {
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 500;
      background: var(--purple-dim);
      color: var(--purple);
    }

    .result-item.bad-case {
      border-left: 3px solid var(--amber);
      background: var(--amber-dim);
    }

    .result-item.bad-case:hover {
      background: rgba(245,158,11,0.2);
    }

    .bad-case-indicator {
      font-size: 10px;
      margin-left: 4px;
    }

    /* ── Search Box ─────────────────────────────────────────────────────────── */
    .search-box {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-subtle);
    }

    .search-box input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: inherit;
      transition: var(--transition);
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    .search-box input::placeholder {
      color: var(--text-tertiary);
    }

    .search-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-input-wrapper input {
      padding-right: 32px;
    }

    .search-clear-btn {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      line-height: 1;
      opacity: 0;
      transition: var(--transition);
    }

    .search-clear-btn:hover {
      color: var(--text-primary);
    }

    .search-clear-btn.visible {
      opacity: 1;
    }

    .search-filters {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }

    .filter-btn:hover {
      background: var(--bg-hover);
      border-color: var(--border-focus);
    }

    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .filter-btn.active:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .filter-count {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-left: auto;
    }

    .result-item.hidden {
      display: none;
    }

    /* ── Main Content ──────────────────────────────────────────────────────── */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-app);
    }

    .toolbar {
      height: var(--toolbar-h);
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 6px;
      flex-shrink: 0;
    }

    .toolbar button {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition);
    }

    .toolbar button:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--border-focus);
    }

    .toolbar button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .toolbar button.primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .toolbar .nav-buttons {
      display: flex;
      gap: 4px;
      margin-left: auto;
      align-items: center;
    }

    .content-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .code-panel {
      width: 42%;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-subtle);
      background: var(--bg-surface);
    }

    .panel-header {
      height: var(--panel-header-h);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-panel);
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .code-editor {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-app);
    }

    .preview-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: auto;
    }

    #container {
      width: 100%;
      height: 100%;
      min-height: 400px;
    }

    .preview-placeholder {
      text-align: center;
      color: var(--text-tertiary);
    }

    .preview-placeholder-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 14px;
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-placeholder-icon svg {
      width: 24px;
      height: 24px;
      color: var(--text-tertiary);
    }

    .preview-placeholder p {
      font-size: 13px;
      margin-bottom: 4px;
      color: var(--text-secondary);
    }

    .preview-placeholder small {
      font-size: 11px;
      color: var(--text-tertiary);
    }

    .info-panel {
      background: var(--bg-surface);
      border-top: 1px solid var(--border-subtle);
      padding: 12px 16px;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .info-panel::-webkit-scrollbar { width: 4px; }
    .info-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .info-panel h4 {
      color: var(--accent);
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .info-panel .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .info-panel .tag {
      padding: 2px 8px;
      background: var(--accent-dim);
      border-radius: 100px;
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
    }

    .info-panel .issues-list {
      margin-top: 8px;
    }

    .info-panel .issue-item {
      color: var(--amber);
      padding: 2px 0;
    }

    .info-panel .skills-section {
      margin-top: 12px;
    }

    .info-panel .skills-section h4 {
      margin-bottom: 6px;
    }

    .info-panel .skill-tag {
      display: inline-block;
      padding: 2px 8px;
      margin: 2px;
      border-radius: 100px;
      font-size: 10px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--border);
      font-weight: 500;
    }

    .info-panel .skill-tag.loaded {
      background: var(--amber-dim);
      color: var(--amber);
      border-color: var(--amber);
    }

    .info-panel .similarity-bar {
      margin-top: 12px;
    }

    .info-panel .similarity-bar .bar-bg {
      height: 8px;
      background: var(--bg-active);
      border-radius: 4px;
      overflow: hidden;
    }

    .info-panel .similarity-bar .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }

    .info-panel .similarity-bar .bar-fill.high { background: var(--green); }
    .info-panel .similarity-bar .bar-fill.medium { background: var(--amber); }
    .info-panel .similarity-bar .bar-fill.low { background: var(--red); }

    .error-message {
      padding: 12px 16px;
      background: var(--red-dim);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius);
      color: var(--red);
      font-size: 13px;
      margin: 16px;
      font-family: 'Monaco', 'Menlo', monospace;
    }

    .loading {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--text-secondary);
    }

    .loading::after {
      content: "";
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Stats Report Modal ────────────────────────────────────────────────── */
    .stats-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .stats-modal {
      background: var(--bg-sidebar);
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 900px;
      max-height: 90vh;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .stats-modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-surface);
    }

    .stats-modal-header h2 {
      font-size: 16px;
      color: var(--text-primary);
      margin: 0;
      font-weight: 600;
    }

    .stats-modal-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-tertiary);
      padding: 4px;
      transition: var(--transition);
    }

    .stats-modal-close:hover {
      color: var(--text-primary);
    }

    .stats-modal-body {
      padding: 20px;
      overflow-y: auto;
      max-height: calc(90vh - 60px);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .stats-modal-body::-webkit-scrollbar { width: 5px; }
    .stats-modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .stats-section {
      margin-bottom: 24px;
    }

    .stats-section h3 {
      font-size: 13px;
      color: var(--text-primary);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-subtle);
      font-weight: 600;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .stats-card {
      background: var(--green-dim);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
    }

    .stats-card.warning {
      background: var(--amber-dim);
      border-color: rgba(245,158,11,0.3);
    }

    .stats-card.error {
      background: var(--red-dim);
      border-color: rgba(239,68,68,0.3);
    }

    .stats-card.info {
      background: var(--accent-dim);
      border-color: rgba(99,102,241,0.3);
    }

    .stats-card .value {
      font-size: 22px;
      font-weight: 600;
      color: var(--green);
    }

    .stats-card.warning .value { color: var(--amber); }
    .stats-card.error .value { color: var(--red); }
    .stats-card.info .value { color: var(--accent); }

    .stats-card .label {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }

    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .stats-table th,
    .stats-table td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-subtle);
    }

    .stats-table th {
      background: var(--bg-surface);
      font-weight: 600;
      color: var(--text-primary);
      font-size: 12px;
    }

    .stats-table tr:hover {
      background: var(--bg-hover);
    }

    .stats-table .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
    }

    .stats-table .badge.success {
      background: var(--green-dim);
      color: var(--green);
    }

    .stats-table .badge.warning {
      background: var(--amber-dim);
      color: var(--amber);
    }

    .stats-table .badge.error {
      background: var(--red-dim);
      color: var(--red);
    }

    .stats-export-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      margin-top: 16px;
      font-weight: 500;
      transition: var(--transition);
    }

    .stats-export-btn:hover {
      background: var(--accent-hover);
    }

    .current-index {
      background: var(--accent);
      color: #fff;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 11px;
      margin-left: 8px;
      font-weight: 500;
    }

    /* ── Compare Modal ──────────────────────────────────────────────────────── */
    .compare-select-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: flex-end;
    }

    .compare-select-row label {
      display: block;
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    .compare-select-row select {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      max-width: 300px;
      min-width: 180px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .compare-select-row select:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    .compare-run-btn {
      padding: 8px 16px;
      background: var(--amber);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: var(--transition);
    }

    .compare-run-btn:hover { background: #d97706; }

    .compare-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 16px;
    }

    .compare-table th {
      background: var(--bg-surface);
      padding: 10px 12px;
      text-align: left;
      border-bottom: 2px solid var(--border-subtle);
      font-weight: 600;
      color: var(--text-primary);
    }

    .compare-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }

    .compare-table tr:hover { background: var(--bg-hover); }

    .delta-positive { color: var(--green); font-weight: 600; }
    .delta-negative { color: var(--red); font-weight: 600; }
    .delta-neutral { color: var(--text-tertiary); }

    .model-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 11px;
      background: var(--purple-dim);
      color: var(--purple);
      margin-left: 8px;
      font-weight: 500;
    }

    .algo-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 11px;
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Scrollbar global ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>📊 LLM Eval Results</h1>
        <div class="summary-info" id="summaryInfo">
          <span class="success">Loading...</span>
        </div>
        <div class="summary-stats" id="summaryStats">
          <!-- Stats will be populated here -->
        </div>
        <div class="search-box">
          <div class="search-input-wrapper">
            <input type="text" id="searchInput" placeholder="Search by ID, query, library..." oninput="filterResults()">
            <button class="search-clear-btn" id="searchClearBtn" onclick="clearSearch()" title="Clear search">✕</button>
          </div>
          <div class="search-filters">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
            <button class="filter-btn" data-filter="bad" onclick="setFilter('bad')">Bad Cases</button>
            <button class="filter-btn" data-filter="blank" onclick="setFilter('blank')">Blank Screen</button>
            <button class="filter-btn" data-filter="render_error" onclick="setFilter('render_error')">Render Errors</button>
            <button class="filter-btn" data-filter="g2" onclick="setFilter('g2')">G2</button>
            <button class="filter-btn" data-filter="g6" onclick="setFilter('g6')">G6</button>
            <span class="filter-count" id="filterCount"></span>
          </div>
        </div>
      </div>
      <div class="results-list" id="resultsList">
        <!-- Results will be populated here -->
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="toolbar">
        <button onclick="runCode().catch(console.error)" class="primary">▶ Run</button>
        <button onclick="runAllCharts()" id="runAllBtn" class="run-all-btn">▶▶ Run All</button>
        <button onclick="copyCode()">📋 Copy</button>
        <button onclick="formatCode()">🔧 Format</button>
        <button onclick="showStatsReport()" class="stats-btn">📊 Stats</button>
        <button onclick="showCompareReport()" class="stats-btn" style="background:#fa8c16;border-color:#fa8c16;">⚖️ Compare</button>
        <button onclick="exportBadCases()" id="exportBadCasesBtn" class="stats-btn" style="background:var(--red);border-color:var(--red);">💾 Save Bad Cases</button>
        <div class="nav-buttons">
          <select id="datasetSelect" onchange="switchDataset(this.value)" class="dataset-select">
            <option value="">Loading datasets...</option>
          </select>
          <button onclick="prevResult()">◀ Prev</button>
          <span class="current-index" id="currentIndex">0/0</span>
          <button onclick="nextResult()">Next ▶</button>
        </div>
      </div>

      <div class="content-area">
        <div class="code-panel">
          <div class="panel-header">📄 Generated Code</div>
          <div class="code-editor">
            <div id="monacoContainer" style="width:100%;height:100%;"></div>
          </div>
        </div>

        <div class="preview-panel">
          <div class="panel-header">👁 Preview</div>
          <div class="preview-container">
            <div class="preview-placeholder" id="placeholder">
              <div class="preview-placeholder-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="3" y="3" width="18" height="18" rx="3"/>
                  <path d="M3 9h18M9 21V9"/>
                </svg>
              </div>
              <p>Click "Run" to preview chart</p>
              <small>Select a result from the sidebar</small>
            </div>
            <div id="container" style="display: none;"></div>
          </div>
          <div class="info-panel" id="infoPanel" style="display: none;">
            <div class="similarity-bar" id="similarityBar">
              <h4>📊 Similarity</h4>
              <div class="bar-bg">
                <div class="bar-fill" id="similarityFill"></div>
              </div>
              <div style="margin-top: 4px; font-size: 11px; color: #8c8c8c;">
                <span id="similarityValue">0%</span> match with expected code
                <span id="renderStatus" class="render-status pending" style="margin-left: 8px;">⏳ Pending</span>
              </div>
            </div>
            <div class="skills-section" id="loadedSkillsSection" style="display: none;">
              <h4>📚 Loaded Skills</h4>
              <div id="loadedSkills"></div>
            </div>
            <div id="issuesContainer" style="display: none;">
              <h4>⚠️ Issues</h4>
              <div class="issues-list" id="issuesList"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    let resultsData = null;
    let currentIndex = -1;
    let chartInstance = null;
    let monacoEditor = null;
    let autoRunTimer = null;
    let renderResults = {};  // Track render success/failure for each result
    let isRunningAll = false;
    let currentDataset = '';  // Track current loaded dataset
    let availableDatasets = [];  // Dynamically discovered datasets
    let currentFilter = 'all';  // Current active filter
    let searchQuery = '';  // Current search query

    // Probe for available result files
    // Detect if API server is available
    let isApiMode = false;
    const API_BASE = window.location.origin;

    async function checkApiMode() {
      try {
        const res = await fetch(`${API_BASE}/api/providers`, { method: 'HEAD' });
        isApiMode = res.ok;
        return isApiMode;
      } catch (e) {
        isApiMode = false;
        return false;
      }
    }

    // Discover available datasets via API or file probing
    async function discoverDatasets() {
      // Try API first
      if (isApiMode) {
        try {
          const res = await fetch(`${API_BASE}/api/results`);
          if (res.ok) {
            const data = await res.json();
            availableDatasets = (data.results || []).map(r => ({
              name: r.name,
              model: r.summary?.model,
              provider: r.summary?.provider,
              totalTests: r.summary?.totalTests,
              avgSimilarity: r.summary?.avgSimilarity,
              modified: r.modified
            }));
            console.log(`[API] Found ${availableDatasets.length} result files`);
            return availableDatasets;
          }
        } catch (e) {
          console.warn('[API] Failed to fetch results, falling back to file probing:', e);
        }
      }

      // Fallback: probe known file patterns
      const candidates = [
        'tool-call-dataset-200-results.json',
        'bm25-dataset-200-results.json',
        'context7-dataset-200-results.json',
        'tool-call-bad-case-results.json',
        'bm25-bad-case-results.json',
        'context7-bad-case-results.json',
        'tool-call-bad-case-frequency-results.json'
      ];

      const found = [];
      await Promise.all(candidates.map(async file => {
        try {
          const res = await fetch(`result/${file}`, { method: 'HEAD' });
          if (res.ok) found.push({ name: file });
        } catch (e) {}
      }));

      availableDatasets = found;
      return found;
    }

    // Initialize dataset selector
    function initDatasetSelector() {
      const select = document.getElementById('datasetSelect');
      if (availableDatasets.length === 0) {
        select.innerHTML = '<option value="">No result files found</option>';
        return;
      }

      select.innerHTML = availableDatasets.map(item => {
        const file = typeof item === 'string' ? item : item.name;
        const meta = typeof item === 'object' ? item : null;
        
        // Build display label - shortened for dropdown
        let label = file.replace(/^eval-/, '').replace(/\.json$/, '');
        if (meta) {
          const parts = [];
          if (meta.model) parts.push(meta.model.slice(0, 15));
          if (meta.avgSimilarity !== undefined) parts.push(`${(meta.avgSimilarity * 100).toFixed(0)}%`);
          if (parts.length > 0) {
            label += ` (${parts.join(', ')})`;
          }
        }
        
        return `<option value="${file}" ${file === currentDataset ? 'selected' : ''} title="${file}">${label}</option>`;
      }).join('');
    }

    // Switch dataset
    async function switchDataset(datasetFile) {
      if (!datasetFile || datasetFile === currentDataset) return;
      currentDataset = datasetFile;
      renderResults = {};  // Reset render results when switching datasets
      await loadData(datasetFile);
    }

    // Load results data
    async function loadData(datasetFile = null) {
      try {
        // Check API mode on first load
        if (availableDatasets.length === 0) {
          await checkApiMode();
          await discoverDatasets();
        }
        // Default to first available dataset
        if (!datasetFile) {
          const first = availableDatasets[0];
          datasetFile = typeof first === 'string' ? first : first?.name;
        }
        currentDataset = datasetFile;
        initDatasetSelector();

        // Try API first, fallback to direct file access
        let data;
        if (isApiMode) {
          try {
            const response = await fetch(`${API_BASE}/api/results/${datasetFile}`);
            if (response.ok) {
              data = await response.json();
            }
          } catch (e) {
            console.warn('[API] Failed to load via API, trying direct file access');
          }
        }
        
        // Fallback to direct file access
        if (!data) {
          const response = await fetch(`result/${datasetFile}`);
          if (!response.ok) throw new Error(`Failed to load ${datasetFile}: ${response.status}`);
          data = await response.json();
        }

        resultsData = data;
        renderResultsList();
        updateSummary();
        if (data.results.length > 0) {
          selectResult(0);
        }
      } catch (error) {
        console.error('Failed to load data:', error);
        document.getElementById('resultsList').innerHTML =
          `<div style="padding: 20px; color: #ff4d4f;">Failed to load results file: ${datasetFile}<br><br>Run: <code>node eval/bm25.js --sample=5</code></div>`;
      }
    }

    // Get similarity class
    function getSimilarityClass(similarity) {
      if (similarity >= 0.5) return 'high';
      if (similarity >= 0.3) return 'medium';
      return 'low';
    }

    // Render results list
    function renderResultsList() {
      const container = document.getElementById('resultsList');
      const badCases = getBadCases();
      const badCaseIds = new Set(badCases.map(c => c.id));
      
      container.innerHTML = resultsData.results.map((result, index) => {
        const sim = result.evaluation?.similarity || 0;
        const simClass = getSimilarityClass(sim);
        const hasError = result.error;
        const library = result.library || 'g2';
        const toolCalls = result.toolCallsCount || 0;
        const resultId = result.id || `test-${index}`;
        const renderState = renderResults[resultId];
        const isBadCase = badCaseIds.has(result.id);

        let renderBadge = '';
        if (renderState === 'success') {
          renderBadge = '<span class="render-status success">✓</span>';
        } else if (renderState === 'blank') {
          renderBadge = '<span class="render-status blank">◻</span>';
        } else if (renderState === 'error') {
          renderBadge = '<span class="render-status error">✗</span>';
        }

        // Bad case indicator
        let badCaseBadge = '';
        if (isBadCase) {
          const badCase = badCases.find(c => c.id === result.id);
          if (badCase?.badReasons?.includes('render_error') || badCase?.badReasons?.includes('llm_error')) {
            badCaseBadge = '<span class="bad-case-indicator error" title="Error">🔴</span>';
          } else if (badCase?.badReasons?.includes('blank_screen')) {
            badCaseBadge = '<span class="bad-case-indicator warning" title="Blank Screen">🟡</span>';
          } else {
            badCaseBadge = '<span class="bad-case-indicator" title="Low Similarity/Issues">🟠</span>';
          }
        }

        return `
          <div class="result-item ${index === currentIndex ? 'active' : ''} ${isBadCase ? 'bad-case' : ''}" data-index="${index}" onclick="selectResult(${index})">
            <div class="topic">${result.id || 'Test ' + (index + 1)} ${renderBadge} ${badCaseBadge}</div>
            <div class="query" title="${escapeHtml(result.query || 'No description')}">${escapeHtml(result.query || 'No description')}</div>
            <div class="meta">
              <span class="library-badge ${library}">${library.toUpperCase()}</span>
              <span class="duration">${result.duration || 0}ms</span>
              <span class="similarity ${simClass}">${(sim * 100).toFixed(0)}%</span>
              ${toolCalls > 0 ? `<span class="tool-calls">🔧 ${toolCalls}</span>` : ''}
              ${!hasError && result.evaluation ? `
                ${result.evaluation.hasIssues ? '<span class="issues-badge">⚠ Issues</span>' : '<span class="mark-badge correct">✓ OK</span>'}
              ` : ''}
              ${hasError ? '<span class="mark-badge incorrect">✗ Error</span>' : ''}
            </div>
          </div>
        `;
      }).join('');
      
      // Re-apply filters after re-rendering list
      applyFilters();
    }

    // Update summary info
    function updateSummary() {
      const summary = resultsData.summary || {};
      const totalTests = summary.totalTests || resultsData.results.length;
      const avgSim = summary.avgSimilarity || 0;
      
      // Calculate render success rate from renderResults
      const renderStats = calculateRenderStats();
      
      // Calculate bad cases count
      const badCases = getBadCases();
      const badCount = badCases.length;
      
      document.getElementById('summaryInfo').innerHTML = `
        <span class="${badCount === 0 ? 'success' : ''}">✓ ${summary.successCount || totalTests} results</span>
        <span>Avg: ${avgSim ? (avgSim * 100).toFixed(0) + '%' : 'N/A'}</span>
        <span>Time: ${summary.avgDuration ? summary.avgDuration.toFixed(0) + 'ms' : 'N/A'}</span>
        <span>Model: ${resultsData.model || 'Unknown'}</span>
        ${resultsData.algorithm ? `<span>Algo: ${resultsData.algorithm}</span>` : ''}
        ${badCount > 0 ? `<span style="color:var(--red)">⚠ ${badCount} bad cases</span>` : ''}
      `;
      
      // Display detailed stats
      const statsHtml = `
        <div class="stat-item success">
          <div class="stat-value">${summary.skillHitRate || 'N/A'}%</div>
          <div class="stat-label">Skill Hit Rate</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${summary.avgToolCalls ? summary.avgToolCalls.toFixed(1) : 'N/A'}</div>
          <div class="stat-label">Avg Tool Calls</div>
        </div>
        <div class="stat-item ${summary.highSimilarityCount > totalTests * 0.7 ? 'success' : 'warning'}">
          <div class="stat-value">${summary.highSimilarityCount || 0}</div>
          <div class="stat-label">High Similarity</div>
        </div>
        <div class="stat-item ${summary.issuesCount === 0 ? 'success' : 'warning'}">
          <div class="stat-value">${summary.issuesCount || 0}</div>
          <div class="stat-label">Issues</div>
        </div>
        <div class="stat-item ${renderStats.rate >= 80 ? 'success' : renderStats.rate >= 50 ? 'warning' : 'error'}">
          <div class="stat-value">${renderStats.rate}%</div>
          <div class="stat-label">Render Success</div>
        </div>
        <div class="stat-item ${renderStats.success >= renderStats.tested * 0.8 ? 'success' : 'warning'}">
          <div class="stat-value">${renderStats.success}/${renderStats.tested}</div>
          <div class="stat-label">Charts OK</div>
        </div>
        <div class="stat-item ${renderStats.blanks === 0 ? 'success' : 'warning'}">
          <div class="stat-value">${renderStats.blanks}</div>
          <div class="stat-label">Blank Screen</div>
        </div>
        <div class="stat-item ${renderStats.errors === 0 ? 'success' : 'error'}">
          <div class="stat-value">${renderStats.errors}</div>
          <div class="stat-label">Render Errors</div>
        </div>
      `;
      document.getElementById('summaryStats').innerHTML = statsHtml;
    }
    
    // Calculate render statistics
    function calculateRenderStats() {
      const tested = Object.keys(renderResults).length;
      const success = Object.values(renderResults).filter(r => r === 'success').length;
      const blanks = Object.values(renderResults).filter(r => r === 'blank').length;
      const errors = Object.values(renderResults).filter(r => r === 'error').length;
      const rate = tested > 0 ? Math.round((success / tested) * 100) : 0;
      return { tested, success, blanks, errors, rate };
    }

    // Get bad cases (render errors, blank screens, low similarity)
    function getBadCases() {
      if (!resultsData?.results) return [];
      
      const badCases = [];
      const lowSimThreshold = 0.3;
      
      for (const result of resultsData.results) {
        const resultId = result.id || `test-${resultsData.results.indexOf(result)}`;
        const renderState = renderResults[resultId];
        const sim = result.evaluation?.similarity || 0;
        const hasError = !!result.error;
        const hasIssues = result.evaluation?.hasIssues;
        
        // Determine bad case type
        const badReasons = [];
        if (renderState === 'error') badReasons.push('render_error');
        if (renderState === 'blank') badReasons.push('blank_screen');
        if (hasError) badReasons.push('llm_error');
        if (sim < lowSimThreshold) badReasons.push('low_similarity');
        if (hasIssues) badReasons.push('code_issues');
        
        if (badReasons.length > 0) {
          badCases.push({
            id: result.id,
            description: result.query,
            codeString: result.expectedCode || result.generatedCode,
            generatedCode: result.generatedCode,
            expectedCode: result.expectedCode,
            library: result.library,
            similarity: sim,
            renderState,
            hasError,
            badReasons,
            evaluation: result.evaluation,
            duration: result.duration,
            toolCallsCount: result.toolCallsCount,
            loadedSkillPaths: result.loadedSkillPaths
          });
        }
      }
      
      return badCases;
    }

    // Set filter type
    function setFilter(filter) {
      currentFilter = filter;
      
      // Update active button state
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
      
      applyFilters();
    }

    // Filter results based on search query and current filter
    function filterResults() {
      searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
      
      // Show/hide clear button
      const clearBtn = document.getElementById('searchClearBtn');
      clearBtn.classList.toggle('visible', searchQuery.length > 0);
      
      applyFilters();
    }

    // Clear search input and reset filters
    function clearSearch() {
      document.getElementById('searchInput').value = '';
      searchQuery = '';
      document.getElementById('searchClearBtn').classList.remove('visible');
      applyFilters();
    }

    // Apply both search and filter
    function applyFilters() {
      if (!resultsData?.results) return;
      
      const badCases = getBadCases();
      const badCaseIds = new Set(badCases.map(c => c.id));
      
      let visibleCount = 0;
      const items = document.querySelectorAll('.result-item');
      
      items.forEach((item) => {
        const index = parseInt(item.dataset.index);
        const result = resultsData.results[index];
        if (!result) return;
        
        const id = (result.id || '').toLowerCase();
        const query = (result.query || '').toLowerCase();
        const library = (result.library || 'g2').toLowerCase();
        const sim = result.evaluation?.similarity || 0;
        const isBadCase = badCaseIds.has(result.id);
        const hasError = !!result.error;
        
        // Check search query match
        const matchesSearch = !searchQuery || 
          id.includes(searchQuery) ||
          query.includes(searchQuery) ||
          library.includes(searchQuery);
        
        // Check filter match
        const renderState = renderResults[result.id || `test-${index}`];
        let matchesFilter = true;
        if (currentFilter === 'bad') {
          matchesFilter = isBadCase;
        } else if (currentFilter === 'blank') {
          matchesFilter = renderState === 'blank';
        } else if (currentFilter === 'render_error') {
          matchesFilter = renderState === 'error';
        } else if (currentFilter === 'g2') {
          matchesFilter = library === 'g2';
        } else if (currentFilter === 'g6') {
          matchesFilter = library === 'g6';
        }
        
        const isVisible = matchesSearch && matchesFilter;
        item.classList.toggle('hidden', !isVisible);
        
        if (isVisible) visibleCount++;
      });
      
      // Update filter count
      const filterCount = document.getElementById('filterCount');
      if (searchQuery || currentFilter !== 'all') {
        filterCount.textContent = `${visibleCount} of ${resultsData.results.length}`;
      } else {
        filterCount.textContent = '';
      }
    }

    // Export bad cases to JSON file
    function exportBadCases() {
      const badCases = getBadCases();
      
      if (badCases.length === 0) {
        alert('No bad cases found! All tests are passing.');
        return;
      }
      
      // Create export data
      const exportData = {
        source: currentDataset,
        exportedAt: new Date().toISOString(),
        summary: {
          totalCases: resultsData.results.length,
          badCasesCount: badCases.length,
          byReason: {
            render_error: badCases.filter(c => c.badReasons.includes('render_error')).length,
            blank_screen: badCases.filter(c => c.badReasons.includes('blank_screen')).length,
            llm_error: badCases.filter(c => c.badReasons.includes('llm_error')).length,
            low_similarity: badCases.filter(c => c.badReasons.includes('low_similarity')).length,
            code_issues: badCases.filter(c => c.badReasons.includes('code_issues')).length
          }
        },
        badCases
      };
      
      // Download JSON
      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const baseName = currentDataset.replace('.json', '').replace('', '');
      a.download = `bad-cases-${baseName}-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      
      // Show summary
      const s = exportData.summary.byReason;
      alert(`Exported ${badCases.length} bad cases:\n\n` +
            `Render Errors: ${s.render_error}\n` +
            `Blank Screens: ${s.blank_screen}\n` +
            `LLM Errors: ${s.llm_error}\n` +
            `Low Similarity: ${s.low_similarity}\n` +
            `Code Issues: ${s.code_issues}`);
    }

    // Calculate comprehensive statistics
    function calculateComprehensiveStats() {
      const results = resultsData?.results || [];
      const summary = resultsData?.summary || {};
      const renderStats = calculateRenderStats();

      // Basic stats
      const totalTests = results.length;
      const successTests = results.filter(r => !r.error).length;
      const errorTests = results.filter(r => r.error).length;

      // Similarity distribution
      const similarities = results.filter(r => r.evaluation?.similarity != null).map(r => r.evaluation.similarity);
      const avgSimilarity = similarities.length > 0
        ? similarities.reduce((a, b) => a + b, 0) / similarities.length
        : 0;
      const highSimCount = similarities.filter(s => s >= 0.5).length;
      const mediumSimCount = similarities.filter(s => s >= 0.3 && s < 0.5).length;
      const lowSimCount = similarities.filter(s => s < 0.3).length;

      // Duration stats
      const durations = results.filter(r => r.duration).map(r => r.duration);
      const avgDuration = durations.length > 0
        ? durations.reduce((a, b) => a + b, 0) / durations.length
        : 0;
      const maxDuration = durations.length > 0 ? Math.max(...durations) : 0;
      const minDuration = durations.length > 0 ? Math.min(...durations) : 0;

      // Library distribution
      const libraryCounts = {};
      results.forEach(r => {
        const lib = r.library || 'g2';
        libraryCounts[lib] = (libraryCounts[lib] || 0) + 1;
      });

      // Issues analysis
      const issuesResults = results.filter(r => r.evaluation?.hasIssues);
      const issuesCount = issuesResults.length;
      const allIssues = issuesResults.flatMap(r => r.evaluation.issues || []);
      const issueTypes = {};
      allIssues.forEach(issue => {
        const key = issue.includes('import') ? 'Missing Import' :
                    issue.includes('Chart') || issue.includes('Graph') ? 'Missing Instance' :
                    issue.includes('render') ? 'Missing Render' : 'Other';
        issueTypes[key] = (issueTypes[key] || 0) + 1;
      });

      // Skill usage
      const skillCounts = {};
      const topSkills = Object.entries(skillCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10);

      // Tool calls stats
      const toolCallsCounts = results.filter(r => r.toolCallsCount != null).map(r => r.toolCallsCount);
      const avgToolCalls = toolCallsCounts.length > 0
        ? toolCallsCounts.reduce((a, b) => a + b, 0) / toolCallsCounts.length
        : 0;
      const toolCallSupportCount = results.filter(r => r.toolCallsCount > 0).length;

      // Bad cases analysis
      const badCases = getBadCases();
      const badCaseByReason = {
        render_error: badCases.filter(c => c.badReasons.includes('render_error')).length,
        blank_screen: badCases.filter(c => c.badReasons.includes('blank_screen')).length,
        llm_error: badCases.filter(c => c.badReasons.includes('llm_error')).length,
        low_similarity: badCases.filter(c => c.badReasons.includes('low_similarity')).length,
        code_issues: badCases.filter(c => c.badReasons.includes('code_issues')).length
      };

      return {
        totalTests,
        successTests,
        errorTests,
        avgSimilarity,
        highSimCount,
        mediumSimCount,
        lowSimCount,
        avgDuration,
        maxDuration,
        minDuration,
        libraryCounts,
        issuesCount,
        issueTypes,
        topSkills,
        avgToolCalls,
        toolCallSupportCount,
        renderStats,
        summary,
        badCasesCount: badCases.length,
        badCaseByReason
      };
    }

    async function runCompare() {
      const fileA = document.getElementById('compareA').value;
      const fileB = document.getElementById('compareB').value;
      const resultDiv = document.getElementById('compareResult');
      resultDiv.innerHTML = '<div class="loading">Loading...</div>';

      try {
        const [dataA, dataB] = await Promise.all([
          fetch(`result/${fileA}`).then(r => r.json()),
          fetch(`result/${fileB}`).then(r => r.json())
        ]);

        const calcStats = (data) => {
          const results = data.results || [];
          const success = results.filter(r => !r.error);
          const sims = success.map(r => r.evaluation?.similarity || 0);
          const avgSim = sims.length > 0 ? sims.reduce((a, b) => a + b, 0) / sims.length : 0;
          const durations = success.filter(r => r.duration).map(r => r.duration);
          const avgDur = durations.length > 0 ? durations.reduce((a, b) => a + b, 0) / durations.length : 0;
          return {
            model: data.model || 'Unknown',
            algorithm: data.algorithm || 'N/A',
            provider: data.provider || 'N/A',
            timestamp: data.timestamp ? new Date(data.timestamp).toLocaleString() : 'N/A',
            total: results.length,
            success: success.length,
            avgSim,
            avgDur,
            highSim: sims.filter(s => s >= 0.5).length,
            medSim: sims.filter(s => s >= 0.3 && s < 0.5).length,
            lowSim: sims.filter(s => s < 0.3).length,
            issues: results.filter(r => r.evaluation?.hasIssues).length
          };
        };

        const sA = calcStats(dataA);
        const sB = calcStats(dataB);

        const delta = (a, b, higherBetter = true) => {
          const diff = a - b;
          if (Math.abs(diff) < 0.001) return '<span class="delta-neutral">—</span>';
          const better = higherBetter ? diff > 0 : diff < 0;
          const cls = better ? 'delta-positive' : 'delta-negative';
          const sign = diff > 0 ? '+' : '';
          return `<span class="${cls}">${sign}${typeof a === 'number' && a < 10 ? diff.toFixed(2) : diff.toFixed(0)}</span>`;
        };

        const pctDelta = (a, b) => {
          const diff = (a - b) * 100;
          if (Math.abs(diff) < 0.1) return '<span class="delta-neutral">—</span>';
          const cls = diff > 0 ? 'delta-positive' : 'delta-negative';
          return `<span class="${cls}">${diff > 0 ? '+' : ''}${diff.toFixed(1)}%</span>`;
        };

        // Per-case comparison
        const mapB = new Map((dataB.results || []).map(r => [r.id, r]));
        const perCase = (dataA.results || [])
          .map(rA => {
            const rB = mapB.get(rA.id);
            if (!rA || !rB || rA.error || rB.error) return null;
            return {
              id: rA.id,
              simA: rA.evaluation?.similarity || 0,
              simB: rB.evaluation?.similarity || 0,
              diff: (rA.evaluation?.similarity || 0) - (rB.evaluation?.similarity || 0)
            };
          })
          .filter(Boolean)
          .sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff))
          .slice(0, 15);

        resultDiv.innerHTML = `
          <div class="stats-section">
            <h3>数据集信息</h3>
            <table class="compare-table">
              <thead><tr><th>指标</th><th>${fileA.replace('-results.json','')}</th><th>${fileB.replace('-results.json','')}</th><th>Delta (A-B)</th></tr></thead>
              <tbody>
                <tr><td>模型</td><td><span class="model-badge">${sA.model}</span></td><td><span class="model-badge">${sB.model}</span></td><td>—</td></tr>
                <tr><td>检索算法</td><td><span class="algo-badge">${sA.algorithm}</span></td><td><span class="algo-badge">${sB.algorithm}</span></td><td>—</td></tr>
                <tr><td>时间</td><td>${sA.timestamp}</td><td>${sB.timestamp}</td><td>—</td></tr>
                <tr><td>总用例数</td><td>${sA.total}</td><td>${sB.total}</td><td>${delta(sA.total, sB.total)}</td></tr>
                <tr><td>成功数</td><td>${sA.success}</td><td>${sB.success}</td><td>${delta(sA.success, sB.success)}</td></tr>
                <tr><td>平均相似度</td><td>${(sA.avgSim * 100).toFixed(1)}%</td><td>${(sB.avgSim * 100).toFixed(1)}%</td><td>${pctDelta(sA.avgSim, sB.avgSim)}</td></tr>
                <tr><td>高相似度 (≥50%)</td><td>${sA.highSim}</td><td>${sB.highSim}</td><td>${delta(sA.highSim, sB.highSim)}</td></tr>
                <tr><td>中相似度 (30-50%)</td><td>${sA.medSim}</td><td>${sB.medSim}</td><td>${delta(sA.medSim, sB.medSim)}</td></tr>
                <tr><td>低相似度 (&lt;30%)</td><td>${sA.lowSim}</td><td>${sB.lowSim}</td><td>${delta(sA.lowSim, sB.lowSim, false)}</td></tr>
                <tr><td>结构问题数</td><td>${sA.issues}</td><td>${sB.issues}</td><td>${delta(sA.issues, sB.issues, false)}</td></tr>
                <tr><td>平均响应时间</td><td>${sA.avgDur.toFixed(0)}ms</td><td>${sB.avgDur.toFixed(0)}ms</td><td>${delta(sA.avgDur, sB.avgDur, false)} ms</td></tr>
              </tbody>
            </table>
          </div>

          ${perCase.length > 0 ? `
          <div class="stats-section">
            <h3>逐用例相似度差异 TOP ${perCase.length}（按差异排序）</h3>
            <table class="compare-table">
              <thead><tr><th>用例 ID</th><th>A 相似度</th><th>B 相似度</th><th>差值 (A-B)</th></tr></thead>
              <tbody>
                ${perCase.map(r => `
                  <tr>
                    <td style="font-size:11px;color:#8c8c8c">${escapeHtml(r.id)}</td>
                    <td>${(r.simA * 100).toFixed(1)}%</td>
                    <td>${(r.simB * 100).toFixed(1)}%</td>
                    <td>${pctDelta(r.simA, r.simB)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
          ` : ''}
        `;
      } catch (e) {
        resultDiv.innerHTML = `<div style="color:#ff4d4f">加载失败: ${escapeHtml(e.message)}</div>`;
      }
    }

    // Select a result
    async function selectResult(index) {
      currentIndex = index;
      const result = resultsData.results[index];
      
      // Get code (prefer generatedCode, fallback to extracting from response)
      let code = result.generatedCode || extractCodeFromMarkdown(result.response) || '';
      if (monacoEditor) {
        monacoEditor.setValue(code);
        clearTimeout(autoRunTimer); // suppress debounce; selectResult calls runCode explicitly
      }
      
      // Update similarity bar
      const sim = result.evaluation?.similarity || 0;
      const simClass = getSimilarityClass(sim);
      document.getElementById('similarityFill').style.width = `${sim * 100}%`;
      document.getElementById('similarityFill').className = `bar-fill ${simClass}`;
      document.getElementById('similarityValue').textContent = `${(sim * 100).toFixed(1)}%`;
      document.getElementById('similarityValue').style.color = simClass === 'high' ? '#52c41a' : simClass === 'medium' ? '#faad14' : '#ff4d4f';
      
      // Update issues
      const issuesContainer = document.getElementById('issuesContainer');
      const issuesList = document.getElementById('issuesList');
      if (result.evaluation?.hasIssues && result.evaluation.issues?.length > 0) {
        issuesContainer.style.display = 'block';
        issuesList.innerHTML = result.evaluation.issues.map(issue => 
          `<div class="issue-item">• ${escapeHtml(issue)}</div>`
        ).join('');
      } else if (result.error) {
        issuesContainer.style.display = 'block';
        issuesList.innerHTML = `<div class="issue-item" style="color:#ff4d4f">• ${escapeHtml(result.error)}</div>`;
      } else {
        issuesContainer.style.display = 'none';
      }
      
      document.getElementById('infoPanel').style.display = 'block';
      
      // Update render status based on cached result
      const renderStatus = document.getElementById('renderStatus');
      const resultId = result.id || `test-${index}`;
      if (renderResults[resultId] === 'success') {
        renderStatus.className = 'render-status success';
        renderStatus.textContent = '✓ Render OK';
      } else if (renderResults[resultId] === 'blank') {
        renderStatus.className = 'render-status blank';
        renderStatus.textContent = '◻ Blank Screen';
      } else if (renderResults[resultId] === 'error') {
        renderStatus.className = 'render-status error';
        renderStatus.textContent = '✗ Error';
      } else {
        renderStatus.className = 'render-status pending';
        renderStatus.textContent = '⏳ Pending';
      }
      
      // Display loaded skills (tool-call mode stores loadedSkillPaths)
      const loadedSkillsSection = document.getElementById('loadedSkillsSection');
      const loadedSkillsContainer = document.getElementById('loadedSkills');
      const loadedSkills = result.loadedSkillIds || result.loadedSkillPaths || [];
      if (loadedSkills.length > 0) {
        loadedSkillsSection.style.display = 'block';
        const unique = [...new Set(loadedSkills.map(s => s.split('/').pop().replace('.md', '')))];
        loadedSkillsContainer.innerHTML = unique.map(skill =>
          `<span class="skill-tag loaded">${escapeHtml(skill)}</span>`
        ).join('');
      } else {
        loadedSkillsSection.style.display = 'none';
      }
      
      // Update current index display
      // Count visible items up to current index for accurate display
      const visibleItems = document.querySelectorAll('.result-item:not(.hidden)');
      let visiblePosition = 0;
      visibleItems.forEach(item => {
        if (parseInt(item.dataset.index) === index) {
          visiblePosition = Array.from(visibleItems).indexOf(item) + 1;
        }
      });
      document.getElementById('currentIndex').textContent = `${visiblePosition}/${visibleItems.length}`;
      
      // Update active state and scroll into view
      const resultsList = document.getElementById('resultsList');
      document.querySelectorAll('.result-item').forEach((item) => {
        const itemIndex = parseInt(item.dataset.index);
        item.classList.toggle('active', itemIndex === index);
        if (itemIndex === index) {
          // Use scrollIntoView for reliable scrolling
          item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      });
      
      // Auto-run
      await runCode();
    }

    // Extract code from markdown
    function extractCodeFromMarkdown(text) {
      if (!text) return '';
      const codeBlockMatch = text.match(/```(?:javascript|js|typescript|ts|html)?\s*([\s\S]*?)```/);
      if (codeBlockMatch) {
        let code = codeBlockMatch[1].trim();
        // If it's HTML, extract the script content
        if (code.startsWith('<!DOCTYPE') || code.startsWith('<html')) {
          const scriptMatch = code.match(/<script[^>]*>([\s\S]*?)<\/script>/);
          if (scriptMatch) {
            return scriptMatch[1].trim();
          }
        }
        return code;
      }
      return text.trim();
    }

    // Detect blank screen in the container
    function detectBlankScreen(container) {
      // No children at all
      if (container.children.length === 0) return true;

      // SVG detection (G2 default renderer)
      const svgs = container.querySelectorAll('svg');
      if (svgs.length > 0) {
        const visibleShapes = container.querySelectorAll('svg path, svg rect, svg circle, svg line, svg polygon, svg polyline, svg ellipse, svg text');
        return visibleShapes.length === 0;
      }

      // Canvas detection (G2 Canvas renderer / G6)
      const canvases = container.querySelectorAll('canvas');
      if (canvases.length > 0) {
        for (const canvas of canvases) {
          if (canvas.width === 0 || canvas.height === 0) continue;
          try {
            const ctx = canvas.getContext('2d');
            if (!ctx) continue;
            // Sample pixels at multiple positions
            const w = canvas.width, h = canvas.height;
            const samplePoints = [
              [w * 0.25, h * 0.25], [w * 0.5, h * 0.5], [w * 0.75, h * 0.75],
              [w * 0.5, h * 0.25], [w * 0.25, h * 0.5], [w * 0.75, h * 0.5],
            ];
            for (const [x, y] of samplePoints) {
              const pixel = ctx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
              // Any non-transparent pixel is considered visible content
              // (works for both light and dark themes)
              if (pixel[3] > 0) {
                return false; // Found visible content
              }
            }
            // All sample points were blank — try a broader sweep
            const stride = Math.max(1, Math.floor(w * h / 1000));
            const imgData = ctx.getImageData(0, 0, w, h).data;
            for (let i = 0; i < imgData.length; i += stride * 4) {
              if (imgData[i + 3] > 0) {
                return false;
              }
            }
            return true; // Canvas is blank
          } catch (e) {
            // Cross-origin or other error — can't determine, assume not blank
            return false;
          }
        }
        return true; // All canvases are blank
      }

      // Fallback: check innerHTML length (very small content likely means blank)
      if (container.innerHTML.trim().length < 10) return true;

      return false;
    }

    // Record render result and update UI
    function setRenderResult(status) {
      const renderStatus = document.getElementById('renderStatus');
      if (status === 'success') {
        renderStatus.className = 'render-status success';
        renderStatus.textContent = '✓ Render OK';
      } else if (status === 'blank') {
        renderStatus.className = 'render-status blank';
        renderStatus.textContent = '◻ Blank Screen';
      } else {
        renderStatus.className = 'render-status error';
        renderStatus.textContent = '✗ Error';
      }
      if (currentIndex >= 0) {
        const resultId = resultsData.results[currentIndex].id || `test-${currentIndex}`;
        renderResults[resultId] = status;
        updateSummary();
        renderResultsList();
      }
    }

    // Run the code
    async function runCode() {
      const code = monacoEditor ? monacoEditor.getValue() : '';
      if (!code.trim()) return;

      // Clear previous instance
      if (chartInstance) {
        try {
          chartInstance.destroy();
        } catch (e) {}
        chartInstance = null;
      }

      const container = document.getElementById('container');
      container.innerHTML = '';
      container.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';

      // Update render status to running
      const renderStatus = document.getElementById('renderStatus');
      renderStatus.className = 'render-status pending';
      renderStatus.textContent = '⏳ Running...';

      try {
        // Transform code
        let transformedCode = code
          .replace(/import\s*\{[^}]*\}\s*from\s*['"]@antv\/g2['"];?/g, '')
          .replace(/import\s*\{[^}]*\}\s*from\s*['"]@antv\/g6['"];?/g, '')
          .replace(/import\s+\w+\s+from\s*['"]@antv\/g2['"];?/g, '')
          .replace(/import\s+\w+\s+from\s*['"]@antv\/g6['"];?/g, '')
          .replace(/import\s*\*\s*as\s+\w+\s*from\s*['"]@antv\/g2['"];?/g, '')
          .replace(/import\s*\*\s*as\s+\w+\s*from\s*['"]@antv\/g6['"];?/g, '')
          .replace(/container:\s*['"]chart-container['"]/g, 'container: container')
          .replace(/container:\s*['"]container['"]/g, 'container: container');

        // Detect library type
        const isG6 = code.includes('@antv/g6') || code.includes('new Graph(') || code.includes('Graph({');

        // Create execution code - wrap in async IIFE to support top-level await
        const execCode = isG6
          ? `const { Graph } = window.G6;\n${transformedCode}`
          : `const { Chart } = window.G2;\n${transformedCode}`;

        // Execute
        const runUserCode = new Function('container', execCode);
        let result = runUserCode(container);

        // Await the result if it's a Promise (e.g. chart.render() returns a Promise)
        if (result && typeof result.then === 'function') {
          result = await Promise.race([
            result,
            new Promise((_, reject) => setTimeout(() => reject(new Error('Render timeout (3s)')), 3000))
          ]);
        }

        chartInstance = result;

        // Wait a short time for async rendering to paint
        await new Promise(resolve => setTimeout(resolve, 300));

        // Detect blank screen
        if (detectBlankScreen(container)) {
          setRenderResult('blank');
        } else {
          setRenderResult('success');
        }

      } catch (error) {
        console.error('Code execution error:', error);
        container.innerHTML = `<div class="error-message">
          <strong>Run Error:</strong><br>
          ${escapeHtml(error.message)}
        </div>`;
        setRenderResult('error');
      }
    }
    
    // Run all charts sequentially
    async function runAllCharts() {
      if (isRunningAll || !resultsData?.results?.length) return;

      isRunningAll = true;
      const btn = document.getElementById('runAllBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Running...';

      // Reset render results
      renderResults = {};

      const total = resultsData.results.length;

      for (let i = 0; i < total; i++) {
        // Update button text with progress
        btn.textContent = `⏳ ${i + 1}/${total}`;

        // Select result (without auto-run, we'll run manually)
        currentIndex = i;
        const result = resultsData.results[i];
        let code = result.generatedCode || extractCodeFromMarkdown(result.response) || '';
        if (monacoEditor) {
          monacoEditor.setValue(code);
          clearTimeout(autoRunTimer);
        }
        document.getElementById('currentIndex').textContent = `${i + 1}/${total}`;

        // Run and await completion
        await runCode();
      }

      // Re-select last item to update full UI
      selectResult(currentIndex);

      isRunningAll = false;
      btn.disabled = false;
      btn.textContent = '▶▶ Run All';

      // Show summary
      const stats = calculateRenderStats();
      alert(`Render Test Complete!\n\nSuccess: ${stats.success}/${stats.tested}\nBlanks: ${stats.blanks}\nErrors: ${stats.errors}\nSuccess Rate: ${stats.rate}%`);
    }

    // Copy code
    function copyCode() {
      const code = monacoEditor ? monacoEditor.getValue() : '';
      navigator.clipboard.writeText(code).then(() => {
        alert('Code copied to clipboard');
      });
    }

    // Format code
    function formatCode() {
      const code = monacoEditor ? monacoEditor.getValue() : '';
      const lines = code.split('\n');
      let indent = 0;
      const formatted = lines.map(line => {
        const trimmed = line.trim();
        if (trimmed.endsWith('}') || trimmed.endsWith('];') || trimmed.endsWith(');')) {
          indent = Math.max(0, indent - 1);
        }
        const result = '  '.repeat(indent) + trimmed;
        if (trimmed.endsWith('{') || trimmed.endsWith('[') || trimmed.endsWith('(')) {
          indent++;
        }
        return result;
      }).join('\n');
      if (monacoEditor) {
        monacoEditor.setValue(formatted);
        clearTimeout(autoRunTimer);
      }
    }

    // Navigation
    function prevResult() {
      if (!resultsData?.results) return;
      
      // Find previous visible item
      let idx = currentIndex - 1;
      while (idx >= 0) {
        const item = document.querySelector(`.result-item[data-index="${idx}"]`);
        if (item && !item.classList.contains('hidden')) {
          selectResult(idx);
          return;
        }
        idx--;
      }
    }

    function nextResult() {
      if (!resultsData?.results) return;
      
      // Find next visible item
      let idx = currentIndex + 1;
      const total = resultsData.results.length;
      while (idx < total) {
        const item = document.querySelector(`.result-item[data-index="${idx}"]`);
        if (item && !item.classList.contains('hidden')) {
          selectResult(idx);
          return;
        }
        idx++;
      }
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      // Skip if user is typing in an input
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        if (e.key === 'Escape') {
          e.target.blur();
        }
        return;
      }
      
      if (e.key === 'ArrowLeft') prevResult();
      if (e.key === 'ArrowRight') nextResult();
      if (e.key === 'Enter' && e.ctrlKey) runCode();
      
      // Focus search on Ctrl+F or '/'
      if ((e.ctrlKey && e.key === 'f') || e.key === '/') {
        e.preventDefault();
        document.getElementById('searchInput').focus();
      }
      
      // Clear search on Escape
      if (e.key === 'Escape') {
        // Clear search input
        document.getElementById('searchInput').value = '';
        searchQuery = '';
        document.getElementById('searchClearBtn').classList.remove('visible');
        // Reset filter to all
        currentFilter = 'all';
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.filter === 'all');
        });
        applyFilters();
      }
    });

    // Initialize Monaco then load data
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
      monacoEditor = monaco.editor.create(document.getElementById('monacoContainer'), {
        value: '',
        language: 'javascript',
        theme: 'vs',
        fontSize: 13,
        lineHeight: 22,
        fontFamily: "'Monaco', 'Menlo', 'JetBrains Mono', 'Fira Code', monospace",
        fontLigatures: true,
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        automaticLayout: true,
        wordWrap: 'on',
        padding: { top: 12, bottom: 12 },
        renderLineHighlight: 'gutter',
        scrollbar: { verticalScrollbarSize: 5, horizontalScrollbarSize: 5 },
      });

      // Debounced auto-run on content change
      monacoEditor.onDidChangeModelContent(() => {
        clearTimeout(autoRunTimer);
        autoRunTimer = setTimeout(() => {
          runCode().catch(console.error);
        }, 500);
      });

      loadData();
    });
  </script>
</body>
</html>

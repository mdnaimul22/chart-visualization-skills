name: Sync and Translate

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch: # Manual trigger

jobs:
  sync-and-translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with Upstream
        run: |
          git remote add upstream https://github.com/antvis/chart-visualization-skills.git || true
          git fetch upstream
          # Merge upstream changes, favoring local for conflicts in .github/
          git merge upstream/master --no-edit || { git checkout --ours .github/ && git add .github/ && git commit -m "chore: resolved conflicts in .github/ during sync"; }

      - name: Run Translation Script
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: "https://integrate.api.nvidia.com/v1"
          LLM_MODEL: "qwen/qwen3.5-122b-a10b"
        run: |
          python .github/scripts/translate.py

      - name: Commit and Push
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "sync: auto-translate from upstream $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "No changes to commit."
          fi

name: Sync and Translate

on:
  schedule:
    - cron: '*/10 * 18 4 *'      # Every 10 mins today (April 18) for initial bulk processing
    - cron: '0 0 19-31 4 *'      # Daily at midnight for the rest of April
    - cron: '0 0 * 1-3,5-12 *'   # Daily at midnight for all other months
  workflow_dispatch: # Manual trigger

jobs:
  sync-and-translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai requests

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with Upstream
        run: |
          git remote add upstream https://github.com/antvis/chart-visualization-skills.git || true
          git fetch upstream
          # Merge upstream changes, favoring local for conflicts in .github/
          git merge upstream/master --no-edit || { git checkout --ours .github/ && git add .github/ && git commit -m "chore: resolved conflicts in .github/ during sync"; }

      - name: Run Translation Script
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: "http://13.204.27.202:8000/v1"
          LLM_MODEL: "CohereForAI_C4AI_Command"
        run: |
          python .github/scripts/translate.py

      - name: Commit and Push
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "sync: auto-translate from upstream $(date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin master
            git push origin master
          else
            echo "No changes to commit."
          fi
